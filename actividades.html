<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Actividades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/actividades.css">
</head>
<body>

  <div class="bg-decoration"></div>

  <div class="container">

    <header class="header">
      <a href="index.html" class="btn-back">← Inicio</a>
      <div class="header-content">
        <span class="header-icon">📋</span>
        <h1>Lista de Actividades</h1>
        <p class="subtitle">Agrega, gestiona y elimina tus actividades</p>
      </div>
    </header>

    <!-- FORMULARIO -->
    <section class="form-section">
      <div class="form-group">
        <input type="text" id="actividadInput" placeholder="Nueva actividad..." />
        <select id="prioridadSelect">
          <option value="alta">Alta</option>
          <option value="media" selected>Media</option>
          <option value="baja">Baja</option>
        </select>
        <button onclick="agregarActividad()">Agregar</button>
      </div>
    </section>

    <!-- STATS -->
    <section class="stats">
      <div class="stat-card">
        <span id="totalCount">0</span>
        <p>Total</p>
      </div>
      <div class="stat-card">
        <span id="pendienteCount">0</span>
        <p>Pendientes</p>
      </div>
      <div class="stat-card">
        <span id="completadoCount">0</span>
        <p>Completadas</p>
      </div>
    </section>

    <!-- LISTA -->
    <section class="list-section">
      <div class="list-header">
        <h2>Mis Actividades</h2>
        <button class="btn-clear" onclick="limpiarTodo()">Limpiar todo</button>
      </div>
      <ul id="actividadesList"></ul>
    </section>

  </div>

  <script src="js/actividades.js"></script>
</body>
</html>
