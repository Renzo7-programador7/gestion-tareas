<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/compras.css">
</head>
<body>

  <div class="bg-decoration"></div>

  <div class="container">

    <header class="header">
      <a href="index.html" class="btn-back">← Inicio</a>
      <div class="header-content">
        <span class="header-icon">🛒</span>
        <h1>Lista de Compras</h1>
        <p class="subtitle">Agrega, gestiona y elimina tus productos</p>
      </div>
    </header>

    <!-- FORMULARIO -->
    <section class="form-section">
      <div class="form-group">
        <input
          type="text"
          id="inputProducto"
          placeholder="Nombre del producto..."
          maxlength="60"
          onkeypress="handleEnter(event)"
        />
        <input
          type="number"
          id="inputCantidad"
          placeholder="Cant."
          min="1"
          value="1"
        />
        <button id="btnAgregar" onclick="agregarProducto()">
          + Agregar
        </button>
      </div>
      <p id="mensajeError" class="mensaje-error"></p>
    </section>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="totalProductos">0</span>
        <span class="stat-label">productos</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="totalCantidad">0</span>
        <span class="stat-label">unidades</span>
      </div>
      <button class="btn-limpiar" onclick="limpiarLista()">🗑 Limpiar todo</button>
    </div>

    <!-- LISTA -->
    <section class="lista-section">
      <p id="listaVacia" class="lista-vacia">
        📭 No hay productos aún. ¡Agrega el primero!
      </p>
      <ul id="listaProductos"></ul>
    </section>

  </div>

  <script src="js/compras.js"></script>
</body>
</html>
