name: CI - Gestion de Tareas

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-validate:
    name: Validar proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar herramientas de validación
        run: |
          npm install -g htmlhint
          npm install -g jshint
          npm install -g stylelint stylelint-config-standard

      - name: Validar archivos HTML
        run: |
          htmlhint "**/*.html"

      - name: Validar archivos JavaScript
        run: |
          jshint --esversion=6 $(find . -name "*.js" -not -path "./.github/*")

      - name: Validar archivos CSS
        run: |
          stylelint "**/*.css"

      - name: Pipeline completado
        run: echo "✅ Validación completada con éxito"